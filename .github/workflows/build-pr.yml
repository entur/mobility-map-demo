name: Build PR
'on': pull_request
jobs:
  # Build job runs for all PRs (including Dependabot and external)
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=moderate
      - run: npm run lint && npm run build
      - name: Copy environment config
        run: cp .github/environments/dev.json dist/bootstrap.json
      - name: Archive build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: dist
          retention-days: 1

  # Firebase preview only for internal PRs (not Dependabot or external)
  preview_deploy:
    needs: build
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-preview.yml@v1
    with:
      gcp_project_id: mobility-map-demo-dev
      environment: dev
      build_artifact_name: build
      build_artifact_path: dist
